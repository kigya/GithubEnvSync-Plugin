name: _build-plugin

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build with Gradle
        run: ./gradlew :github-env-sync-plugin:assemble --stacktrace

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugin-artifacts
          path: github-env-sync-plugin/build/libs/
